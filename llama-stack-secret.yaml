apiVersion: v1
kind: Secret
metadata:
  name: llama-stack-inference-secret
type: Opaque
stringData:
  INFERENCE_MODEL: "${INFERENCE_MODEL}"
  VLLM_URL: "${VLLM_URL}"
  VLLM_API_TOKEN: "${VLLM_API_TOKEN}"
  VLLM_TLS_VERIFY: "${VLLM_TLS_VERIFY:-false}"
  VLLM_MAX_TOKENS: "${VLLM_MAX_TOKENS:-8192}"
  EMBEDDING_MODEL: "${EMBEDDING_MODEL}"
  EMBEDDING_PROVIDER_MODEL_ID: "${EMBEDDING_PROVIDER_MODEL_ID}"
  EMBEDDING_DIMENSION: "${EMBEDDING_DIMENSION:-768}"
  VLLM_EMBEDDING_URL: "${VLLM_EMBEDDING_URL}"
  VLLM_EMBEDDING_API_TOKEN: "${VLLM_EMBEDDING_API_TOKEN}"
  VLLM_EMBEDDING_TLS_VERIFY: "${VLLM_EMBEDDING_TLS_VERIFY:-false}"
  # Victoria Metrics MCP servers
  VLOGS_URL: "${VLOGS_URL}"
  VCPC_URL: "${VCPC_URL}"
