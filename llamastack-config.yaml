version: 2
image_name: rh

apis:
  - agents
  - batches
  - datasetio
  - eval
  - inference
  - safety
  - scoring
  - tool_runtime
  - vector_io
  - files

providers:
  inference:
    - provider_id: vllm-inference
      provider_type: remote::vllm
      config:
        base_url: ${env.VLLM_URL}
        max_tokens: ${env.VLLM_MAX_TOKENS:=4096}
        api_token: ${env.VLLM_API_TOKEN}
        tls_verify: ${env.VLLM_TLS_VERIFY:=false}
    - provider_id: vllm-embedding
      provider_type: remote::vllm
      config:
        base_url: ${env.VLLM_EMBEDDING_URL}
        api_token: ${env.VLLM_EMBEDDING_API_TOKEN}
        tls_verify: ${env.VLLM_EMBEDDING_TLS_VERIFY:=false}

  agents:
    - provider_id: meta-reference
      provider_type: inline::meta-reference
      config:
        persistence:
          agent_state:
            backend: kv_default
            namespace: agents::meta_reference
          responses:
            backend: sql_default
            table_name: agents_responses
            num_writers: 4
            max_write_queue_size: 10000

  batches:
    - provider_id: reference
      provider_type: inline::reference
      config:
        kvstore:
          backend: kv_default
          namespace: batches

  datasetio:
    - provider_id: huggingface
      provider_type: remote::huggingface
      config:
        kvstore:
          backend: kv_default
          namespace: datasetio::huggingface
    - provider_id: localfs
      provider_type: inline::localfs
      config:
        kvstore:
          backend: kv_default
          namespace: datasetio::localfs

  eval:
    - provider_id: trustyai_lmeval
      provider_type: remote::trustyai_lmeval
      module: llama_stack_provider_lmeval==0.2.4
      config:
        base_url: ${env.VLLM_URL}
        use_k8s: false

  files:
    - provider_id: meta-reference-files
      provider_type: inline::localfs
      config:
        storage_dir: /opt/app-root/src/.llama/distributions/rh/files
        metadata_store:
          backend: sql_default
          table_name: files_metadata

  safety:
    - provider_id: trustyai_fms
      provider_type: remote::trustyai_fms
      module: llama_stack_provider_trustyai_fms==0.3.2
      config:
        shields: {}

  scoring:
    - provider_id: basic
      provider_type: inline::basic
      config: {}
    - provider_id: llm-as-judge
      provider_type: inline::llm-as-judge
      config: {}
    - provider_id: braintrust
      provider_type: inline::braintrust
      config:
        openai_api_key: ""

  tool_runtime:
    - provider_id: brave-search
      provider_type: remote::brave-search
      config:
        api_key: ""
        max_results: 3
    - provider_id: tavily-search
      provider_type: remote::tavily-search
      config:
        api_key: ""
        max_results: 3
    - provider_id: rag-runtime
      provider_type: inline::rag-runtime
      config: {}
    - provider_id: model-context-protocol
      provider_type: remote::model-context-protocol
      config: {}

  vector_io:
    - provider_id: milvus
      provider_type: inline::milvus
      config:
        db_path: /opt/app-root/src/.llama/distributions/rh/milvus.db
        persistence:
          backend: kv_default
          namespace: vector_io::milvus

registered_resources:
  models:
    - model_id: ${env.INFERENCE_MODEL}
      provider_id: vllm-inference
      model_type: llm
      provider_model_id: ${env.INFERENCE_MODEL}
      metadata: {}
    - model_id: ${env.EMBEDDING_MODEL}
      provider_id: vllm-embedding
      model_type: embedding
      provider_model_id: ${env.EMBEDDING_PROVIDER_MODEL_ID}
      metadata:
        embedding_dimension: ${env.EMBEDDING_DIMENSION:=768}

  tool_groups:
    - toolgroup_id: builtin::websearch
      provider_id: tavily-search
    - toolgroup_id: builtin::rag
      provider_id: rag-runtime
    - toolgroup_id: mcp::openshift
      provider_id: model-context-protocol
      mcp_endpoint:
        uri: http://openshift-mcp-server:8080/sse
    - toolgroup_id: mcp::vlogs
      provider_id: model-context-protocol
      mcp_endpoint:
        uri: ${env.VLOGS_URL}
    - toolgroup_id: mcp::vcpc-metrics
      provider_id: model-context-protocol
      mcp_endpoint:
        uri: ${env.VCPC_URL}

  shields: []
  vector_stores: []
  datasets: []
  scoring_fns: []
  benchmarks: []

storage:
  backends:
    kv_default:
      type: kv_postgres
      host: ${env.POSTGRES_HOST}
      port: ${env.POSTGRES_PORT:=5432}
      db: ${env.POSTGRES_DB}
      user: ${env.POSTGRES_USER}
      password: ${env.POSTGRES_PASSWORD}
      table_name: llamastack_kvstore
    sql_default:
      type: sql_postgres
      host: ${env.POSTGRES_HOST}
      port: ${env.POSTGRES_PORT:=5432}
      db: ${env.POSTGRES_DB}
      user: ${env.POSTGRES_USER}
      password: ${env.POSTGRES_PASSWORD}
  stores:
    conversations:
      backend: sql_default
      table_name: openai_conversations
    inference:
      backend: sql_default
      table_name: inference_store
      num_writers: 4
      max_write_queue_size: 10000
    metadata:
      backend: kv_default
      namespace: registry
